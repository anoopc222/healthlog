
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080f1e">
<title>HealthLog Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080f1e;
  --surface: #0e1a30;
  --card: #122040;
  --card2: #162850;
  --border: #1e3256;
  --border2: #253d68;
  --accent: #4fa3f7;
  --accent2: #00e5b4;
  --warn: #ffb347;
  --danger: #ff5c5c;
  --good: #3ddc84;
  --text: #ddeeff;
  --muted: #6888aa;
  --muted2: #4a6280;
  --radius: 20px;
  --r-sm: 12px;
  --r-xs: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 90px;
}

/* HEADER */
.header {
  padding: 18px 18px 0;
  background: rgba(8,15,30,0.95);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(79,163,247,0.1);
}
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.logo { font-family: 'Fraunces', serif; font-size: 21px; color: var(--text); letter-spacing: -0.3px; }
.logo em { font-style: italic; color: var(--accent); }
.logo sup { font-family: 'Sora', sans-serif; font-size: 9px; color: var(--accent2); font-weight: 600; letter-spacing: 1px; vertical-align: super; }
.hdr-btns { display: flex; gap: 8px; }
.hbtn {
  padding: 8px 14px; border-radius: 50px; font-size: 12px; font-weight: 600;
  font-family: 'Sora', sans-serif; cursor: pointer; border: 1.5px solid var(--border2);
  background: var(--card); color: var(--text); display: flex; align-items: center; gap: 5px;
  transition: all 0.18s;
}
.hbtn:active { transform: scale(0.95); opacity: 0.8; }
.hbtn.primary { background: var(--accent); border-color: var(--accent); color: #080f1e; }
.hbtn.scan { background: rgba(0,229,180,0.12); border-color: var(--accent2); color: var(--accent2); }

/* NAV */
.nav { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.ntab {
  flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--muted); border-bottom: 2.5px solid transparent;
  letter-spacing: 0.3px; transition: all 0.2s; text-transform: uppercase;
}
.ntab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* CONTENT */
.content { padding: 14px 16px; }

/* SESSION BLOCK */
.session { margin-bottom: 24px; animation: fadeUp 0.35s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.session-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 2px;
}
.session-date-pill {
  background: var(--accent); color: #080f1e;
  font-size: 11px; font-weight: 700; padding: 5px 12px;
  border-radius: 50px; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0;
}
.session-line { flex: 1; height: 1px; background: var(--border2); }
.session-flag { font-size: 11px; font-weight: 600; flex-shrink: 0; }
.session-actions { display: flex; gap: 4px; flex-shrink: 0; }
.sess-btn {
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted); font-size: 12px; padding: 4px 8px; cursor: pointer;
  font-family: 'Sora', sans-serif; transition: all 0.15s;
}
.sess-btn:active { background: var(--card2); }
.sess-btn.danger { border-color: rgba(255,92,92,0.3); color: var(--danger); }

/* ACCORDION */
.session-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
  opacity: 0;
}
.session.open .session-body { max-height: 2000px; opacity: 1; }
.session-header { cursor: pointer; user-select: none; }
.session-chevron {
  font-size: 12px; color: var(--muted); flex-shrink: 0;
  transition: transform 0.3s ease; display: inline-block;
}
.session.open .session-chevron { transform: rotate(180deg); }
.session-header:active { opacity: 0.8; }

/* PANEL CARD */
.panel-card {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: var(--card2);
  border-bottom: 1px solid var(--border);
}
.panel-icon { font-size: 14px; }
.panel-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; flex: 1; }
.panel-alert { font-size: 10px; }

.metric-row {
  display: flex; align-items: center; padding: 10px 14px;
  border-bottom: 1px solid rgba(30,50,86,0.5); gap: 8px;
}
.metric-row:last-child { border-bottom: none; }
.mr-name { flex: 1; }
.mr-name .mn { font-size: 13px; color: var(--text); }
.mr-name .mu { font-size: 10px; color: var(--muted); margin-top: 1px; }
.mr-val { font-size: 15px; font-weight: 600; text-align: right; }
.mr-val .vu { font-size: 10px; font-weight: 400; color: var(--muted); }
.mr-badge {
  font-size: 9px; font-weight: 700; padding: 3px 7px;
  border-radius: 20px; min-width: 42px; text-align: center; letter-spacing: 0.3px;
}
.s-ok { color: var(--good); }
.s-hi { color: var(--danger); }
.s-lo { color: var(--warn); }
.s-na { color: var(--muted); }
.b-ok { background: rgba(61,220,132,0.12); color: var(--good); }
.b-hi { background: rgba(255,92,92,0.12); color: var(--danger); }
.b-lo { background: rgba(255,179,71,0.12); color: var(--warn); }
.b-na { background: rgba(104,136,170,0.1); color: var(--muted); }

/* UPLOAD ZONE */
.upload-box {
  border: 2px dashed var(--border2); border-radius: var(--radius);
  padding: 26px 18px; text-align: center; cursor: pointer; position: relative;
  transition: all 0.2s; margin-bottom: 14px;
}
.upload-box.drag, .upload-box:hover { border-color: var(--accent2); background: rgba(0,229,180,0.05); }
.upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.ub-icon { font-size: 30px; margin-bottom: 8px; }
.ub-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.ub-sub { font-size: 12px; color: var(--muted); }
.ub-badge { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 600; color: var(--accent2); background: rgba(0,229,180,0.1); border-radius: 50px; padding: 4px 12px; }

/* FILE QUEUE */
.file-queue { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.fq-item {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 9px 12px;
  display: flex; align-items: center; gap: 10px;
}
.fq-icon { font-size: 20px; flex-shrink: 0; }
.fq-name { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fq-status { font-size: 11px; flex-shrink: 0; }
.fq-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; }

/* PARSE BAR */
.parse-bar {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 12px; display: none;
}
.parse-bar.visible { display: block; }
.pb-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.pb-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* AGG PREVIEW */
.agg-box { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.agg-top { background: rgba(0,229,180,0.08); border-bottom: 1px solid var(--border2); padding: 12px 14px; }
.agg-title { font-size: 13px; font-weight: 600; color: var(--accent2); }
.agg-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.date-row { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.date-row label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
.date-row input {
  width: 100%; padding: 9px 12px; border-radius: 10px; border: 1.5px solid var(--border2);
  background: var(--card2); font-family: 'Sora', sans-serif; font-size: 13px; color: var(--text); outline: none;
}
.date-row input:focus { border-color: var(--accent); }

/* CHART */
.chart-wrap { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.chart-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cpill {
  padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border2); color: var(--muted); cursor: pointer;
  background: var(--card2); transition: all 0.18s;
}
.cpill.active { border-color: var(--accent); background: rgba(79,163,247,0.15); color: var(--accent); }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  padding: 20px 18px 44px; width: 100%;
  transform: translateY(50px);
  transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
  max-height: 93vh; overflow-y: auto;
}
.overlay.open .modal { transform: translateY(0); }
.drag-pill { width: 36px; height: 4px; background: var(--border2); border-radius: 4px; margin: 0 auto 18px; }
.modal-title {
  font-family: 'Fraunces', serif; font-size: 19px; color: var(--text);
  margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center;
}
.xbtn {
  background: var(--card2); border: 1px solid var(--border2); border-radius: 50%;
  width: 30px; height: 30px; cursor: pointer; color: var(--muted); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}

/* FORM */
.fsec { margin-bottom: 18px; }
.fsec-title { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg.full { grid-column: span 2; }
.fg label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.fg input {
  padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border2);
  background: var(--card); font-family: 'Sora', sans-serif; font-size: 13px;
  color: var(--text); outline: none; transition: border-color 0.18s; -webkit-appearance: none;
}
.fg input:focus { border-color: var(--accent); }
.fg input::placeholder { color: var(--muted2); }
.sbtn {
  width: 100%; padding: 14px; background: var(--accent); color: #080f1e;
  border: none; border-radius: 13px; font-family: 'Sora', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px;
  transition: opacity 0.18s;
}
.sbtn:active { opacity: 0.8; }
.sbtn.sec { background: transparent; color: var(--accent2); border: 1.5px solid var(--accent2); margin-top: 8px; }

/* MISC */
.slabel { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.empty { text-align: center; padding: 52px 24px; color: var(--muted); }
.ei { font-size: 46px; margin-bottom: 14px; }
.et { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.es { font-size: 13px; line-height: 1.6; }
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1a3460; color: var(--text); padding: 11px 20px;
  border-radius: 50px; font-size: 12px; font-weight: 600; z-index: 400;
  transition: transform 0.28s; white-space: nowrap;
  border: 1px solid var(--accent); box-shadow: 0 6px 24px rgba(79,163,247,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.ref-group { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.rg-head { background: var(--card2); padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); }
.rg-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(30,50,86,0.5); font-size: 12px; }
.rg-row:last-child { border-bottom: none; }
.rg-range { color: var(--muted); font-size: 11px; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo">Health<em>Log</em><sup>PRO</sup></div>
    <div class="hdr-btns">
      <button class="hbtn" onclick="manageApiKey()" title="API Key Settings">🔑</button>
      <button class="hbtn scan" onclick="openUpload()">📄 Scan</button>
      <button class="hbtn primary" onclick="openAdd()">＋ Add</button>
    </div>
  </div>
  <div class="nav">
    <div class="ntab active" onclick="setTab('sessions',this)">Sessions</div>
    <div class="ntab" onclick="setTab('trends',this)">Trends</div>
    <div class="ntab" onclick="setTab('summary',this)">Summary</div>
    <div class="ntab" onclick="setTab('reference',this)">Reference</div>
  </div>
</div>

<div class="content" id="content"></div>

<!-- ADD MODAL -->
<div class="overlay" id="addOverlay" onclick="ooc(event,'addOverlay')">
<div class="modal">
  <div class="drag-pill"></div>
  <div class="modal-title"><span id="addTitle">New Session</span><button class="xbtn" onclick="cm('addOverlay')">✕</button></div>
  <div class="fsec"><div class="fsec-title">📅 Date</div><div class="fgrid"><div class="fg full"><label>Test Date</label><input type="date" id="f-date"></div></div></div>
  <div class="fsec"><div class="fsec-title">🩸 Basic Panel</div><div class="fgrid">
    <div class="fg"><label>Blood Sugar mg/dL</label><input type="number" id="f-sugar" placeholder="100"></div>
    <div class="fg"><label>HbA1c %</label><input type="number" id="f-hba1c" placeholder="5.4" step="0.1"></div>
    <div class="fg full"><label>Avg Blood Glucose mg/dL</label><input type="number" id="f-avgGlucose" placeholder="108" step="0.1"></div>
  </div></div>
  <div class="fsec"><div class="fsec-title">🫀 Lipid Profile</div><div class="fgrid">
    <div class="fg"><label>Total Cholesterol</label><input type="number" id="f-chol" placeholder="176"></div>
    <div class="fg"><label>Triglycerides</label><input type="number" id="f-trig" placeholder="83"></div>
    <div class="fg"><label>HDL</label><input type="number" id="f-hdl" placeholder="40"></div>
    <div class="fg"><label>LDL</label><input type="number" id="f-ldl" placeholder="119"></div>
    <div class="fg"><label>VLDL</label><input type="number" id="f-vldl" placeholder="17"></div>
    <div class="fg"><label>TC/HDL Ratio</label><input type="number" id="f-tcholRatio" placeholder="4.4" step="0.1"></div>
    <div class="fg"><label>LDL/HDL Ratio</label><input type="number" id="f-ldlhdlRatio" placeholder="3.0" step="0.1"></div>
  </div></div>
  <div class="fsec"><div class="fsec-title">🫁 Renal Function</div><div class="fgrid">
    <div class="fg"><label>Urea mg/dL</label><input type="number" id="f-urea" placeholder="36" step="0.1"></div>
    <div class="fg"><label>Creatinine mg/dL</label><input type="number" id="f-creatinine" placeholder="0.9" step="0.01"></div>
    <div class="fg"><label>Uric Acid mg/dL</label><input type="number" id="f-uric" placeholder="5.6" step="0.1"></div>
  </div></div>
  <div class="fsec"><div class="fsec-title">🦋 Thyroid</div><div class="fgrid">
    <div class="fg"><label>TSH mIU/L</label><input type="number" id="f-thyroid" placeholder="4.2" step="0.001"></div>
    <div class="fg"><label>T3 ng/dL</label><input type="number" id="f-t3" placeholder="100" step="0.1"></div>
    <div class="fg"><label>T4 µg/dL</label><input type="number" id="f-t4" placeholder="8.0" step="0.1"></div>
  </div></div>
  <div class="fsec"><div class="fsec-title">☀️ Vitamins & Minerals</div><div class="fgrid">
    <div class="fg"><label>Vitamin D ng/mL</label><input type="number" id="f-vitd" placeholder="28.9" step="0.1"></div>
    <div class="fg"><label>Vitamin B12 pg/mL</label><input type="number" id="f-vitb12" placeholder="300" step="0.1"></div>
    <div class="fg"><label>Hemoglobin g/dL</label><input type="number" id="f-hb" placeholder="14.5" step="0.1"></div>
  </div></div>
  <button class="sbtn" onclick="saveRecord()">Save Session</button>
</div>
</div>

<!-- UPLOAD MODAL -->
<div class="overlay" id="uploadOverlay" onclick="ooc(event,'uploadOverlay')">
<div class="modal">
  <div class="drag-pill"></div>
  <div class="modal-title"><span>Scan Lab Reports</span><button class="xbtn" onclick="cm('uploadOverlay')">✕</button></div>

  <div class="upload-box" id="uploadBox"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept="image/*,.pdf" multiple onchange="queueFiles(this.files)">
    <div class="ub-icon">🗂️</div>
    <div class="ub-title">Upload Multiple Reports</div>
    <div class="ub-sub">Select or drop several files from the same visit</div>
    <div class="ub-badge">✨ AI reads &amp; merges all reports automatically</div>
  </div>

  <div class="file-queue" id="fileQueue"></div>
  <div class="parse-bar" id="parseBar">
    <div class="pb-row"><div class="spinner" id="parseSpinner"></div><div id="parseText">Analysing…</div></div>
    <div class="pb-sub" id="parseSub"></div>
  </div>
  <div id="aggPreview"></div>
  <button class="sbtn" id="scanBtn" onclick="startParsing()" style="display:none">🔬 Extract &amp; Merge All Reports</button>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────────────
const REF = {
  sugar:       { name:'Blood Sugar',       unit:'mg/dL',  lo:70,  hi:99,   group:'Basic' },
  hba1c:       { name:'HbA1c',             unit:'%',      lo:0,   hi:5.6,  group:'Basic' },
  avgGlucose:  { name:'Avg Blood Glucose', unit:'mg/dL',  lo:70,  hi:115,  group:'Basic' },
  chol:        { name:'Cholesterol',       unit:'mg/dL',  lo:0,   hi:200,  group:'Lipid' },
  trig:        { name:'Triglycerides',     unit:'mg/dL',  lo:0,   hi:150,  group:'Lipid' },
  hdl:         { name:'HDL',               unit:'mg/dL',  lo:40,  hi:999,  group:'Lipid', hdlMode:true },
  ldl:         { name:'LDL',               unit:'mg/dL',  lo:0,   hi:100,  group:'Lipid' },
  vldl:        { name:'VLDL',              unit:'mg/dL',  lo:5,   hi:40,   group:'Lipid' },
  tcholRatio:  { name:'TC/HDL Ratio',      unit:'',       lo:0,   hi:5,    group:'Lipid' },
  ldlhdlRatio: { name:'LDL/HDL Ratio',     unit:'',       lo:0,   hi:3.5,  group:'Lipid' },
  urea:        { name:'Urea',              unit:'mg/dL',  lo:10,  hi:45,   group:'Renal' },
  creatinine:  { name:'Creatinine',        unit:'mg/dL',  lo:0.7, hi:1.3,  group:'Renal' },
  uric:        { name:'Uric Acid',         unit:'mg/dL',  lo:3.5, hi:7.2,  group:'Renal' },
  thyroid:     { name:'TSH',               unit:'mIU/L',  lo:0.4, hi:4.0,  group:'Thyroid' },
  t3:          { name:'T3',                unit:'ng/dL',  lo:80,  hi:200,  group:'Thyroid' },
  t4:          { name:'T4',                unit:'µg/dL',  lo:4.5, hi:12.5, group:'Thyroid' },
  vitd:        { name:'Vitamin D',         unit:'ng/mL',  lo:20,  hi:50,   group:'Vitamins' },
  vitb12:      { name:'Vitamin B12',       unit:'pg/mL',  lo:200, hi:900,  group:'Vitamins' },
  hb:          { name:'Hemoglobin',        unit:'g/dL',   lo:13.5,hi:17.5, group:'Vitamins' },
};
const GROUPS = {
  Basic:    { icon:'🩸', keys:['sugar','hba1c','avgGlucose'] },
  Lipid:    { icon:'🫀', keys:['chol','trig','hdl','ldl','vldl','tcholRatio','ldlhdlRatio'] },
  Renal:    { icon:'🫁', keys:['urea','creatinine','uric'] },
  Thyroid:  { icon:'🦋', keys:['thyroid','t3','t4'] },
  Vitamins: { icon:'☀️', keys:['vitd','vitb12','hb'] },
};
const FIELDS = Object.keys(REF);

const SEED = [
  { date:'2024-02-27', thyroid:9.9, vitd:19 },
  { date:'2024-05-27', sugar:101, thyroid:24.4, uric:8.9, chol:265, vitd:63.8 },
  { date:'2024-07-05', sugar:102, thyroid:9, uric:8, chol:249, vitd:37 },
  { date:'2024-08-20', sugar:109, thyroid:5.3, uric:6.9, chol:220 },
  { date:'2024-09-29', sugar:105, thyroid:3.6, uric:8, chol:256 },
  { date:'2024-10-20', sugar:94, thyroid:8.8, uric:6.5, chol:215 },
  { date:'2024-11-09', sugar:96, thyroid:4.7, uric:7.2, chol:236, hba1c:5.2 },
  { date:'2024-12-11', sugar:98, thyroid:3.9, uric:6.1, chol:190 },
  { date:'2025-04-12', sugar:101, chol:205, hba1c:5.5 },
  { date:'2025-08-15', sugar:107, thyroid:4.968, chol:217, hba1c:5.4 },
  { date:'2025-10-13', thyroid:5.227, uric:7.4, chol:236 },
  { date:'2026-02-01', sugar:106, uric:6, chol:240, vitd:28.9, hba1c:5.3 },
  { date:'2026-03-29', hba1c:5.4, avgGlucose:108.3, chol:176, trig:83, hdl:40, ldl:119, vldl:17, tcholRatio:4.4, ldlhdlRatio:3.0, urea:36, creatinine:0.9, uric:5.6 },
];

// ── STATE ────────────────────────────────────────────────────────
let records = [];
let currentTab = 'sessions';
let editIndex = null;
let chartKey = 'chol';
let chartInst = null;
let fileQueue = [];

function load() {
  const s = localStorage.getItem('hlp_v4');
  records = s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED));
  if (!s) persist();
}
function persist() { localStorage.setItem('hlp_v4', JSON.stringify(records)); }
function byDate() { return [...records].sort((a,b)=>new Date(b.date)-new Date(a.date)); }

// ── UTILS ────────────────────────────────────────────────────────
function pn(v) { const x=parseFloat(v); return isNaN(x)?null:x; }
function fmtDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtShort(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}); }

function st(key, val) {
  if (val==null) return 'na';
  const r=REF[key]; if(!r) return 'na';
  if (r.hdlMode) return val<r.lo?'lo':'ok';
  if (val>r.hi) return 'hi';
  if (val<r.lo) return 'lo';
  return 'ok';
}
function bdg(key, val) {
  const s=st(key,val);
  return { ok:['b-ok','NORMAL'], hi:['b-hi','HIGH'], lo:['b-lo','LOW'], na:['b-na','—'] }[s];
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  const c=document.getElementById('content'); c.innerHTML='';
  if (currentTab==='sessions') renderSessions(c);
  else if (currentTab==='trends') renderTrends(c);
  else if (currentTab==='summary') renderSummary(c);
  else renderRef(c);
}

// ── SESSIONS ─────────────────────────────────────────────────────
function renderSessions(c) {
  const data=byDate();
  if (!data.length) {
    c.innerHTML=`<div class="empty"><div class="ei">🧪</div><div class="et">No sessions yet</div><div class="es">Tap <b>Scan</b> to upload lab report photos or <b>+ Add</b> to enter manually.</div></div>`;
    return;
  }
  let html=`<div class="slabel">${data.length} Test Session${data.length>1?'s':''} — tap date to expand</div>`;
  data.forEach((r, vi) => {
    const ri=records.indexOf(r);
    const abnormal=FIELDS.filter(k=>r[k]!=null && st(k,r[k])!=='ok');
    const totalVals=FIELDS.filter(k=>r[k]!=null).length;
    const flagHtml = abnormal.length
      ? `<span class="session-flag" style="color:var(--warn)">${abnormal.length} flag${abnormal.length>1?'s':''}</span>`
      : `<span class="session-flag" style="color:var(--good)">✓ All OK</span>`;

    // summary mini-chips shown when collapsed
    const miniChips = FIELDS.filter(k=>r[k]!=null).slice(0,4).map(k=>{
      const s=st(k,r[k]);
      const col=s==='ok'?'var(--good)':s==='hi'?'var(--danger)':s==='lo'?'var(--warn)':'var(--muted)';
      return `<span style="font-size:10px;color:${col};background:rgba(255,255,255,0.05);padding:2px 7px;border-radius:20px;border:1px solid ${col}22">${REF[k].name.split(' ')[0]}: ${r[k]}</span>`;
    }).join('');
    const moreCount = totalVals > 4 ? `<span style="font-size:10px;color:var(--muted)">+${totalVals-4} more</span>` : '';

    // build panels (for body)
    const panels = Object.entries(GROUPS).map(([gname,g])=>{
      const present=g.keys.filter(k=>r[k]!=null);
      if (!present.length) return '';
      const hiN=present.filter(k=>st(k,r[k])==='hi').length;
      const loN=present.filter(k=>st(k,r[k])==='lo').length;
      const alertTxt = hiN||loN
        ? `<span class="panel-alert" style="color:${hiN?'var(--danger)':'var(--warn)'}">${[hiN?`${hiN}↑`:'',loN?`${loN}↓`:''].filter(Boolean).join(' ')}</span>`
        : `<span class="panel-alert" style="color:var(--good)">✓</span>`;
      const rows=present.map(k=>{
        const val=r[k]; const [bc,bl]=bdg(k,val); const sc=`s-${st(k,val)}`;
        return `<div class="metric-row">
          <div class="mr-name"><div class="mn">${REF[k].name}</div><div class="mu">${REF[k].unit||'ratio'}</div></div>
          <div class="mr-val ${sc}">${val}<span class="vu"> ${REF[k].unit}</span></div>
          <div class="mr-badge ${bc}">${bl}</div>
        </div>`;
      }).join('');
      return `<div class="panel-card">
        <div class="panel-header"><span class="panel-icon">${g.icon}</span><span class="panel-title">${gname}</span>${alertTxt}</div>
        ${rows}
      </div>`;
    }).join('');

    html+=`<div class="session" id="sess-${vi}" style="animation-delay:${vi*0.04}s">
      <div class="session-header" onclick="toggleSession('sess-${vi}')">
        <div class="session-date-pill">📅 ${fmtDate(r.date)}</div>
        <div class="session-line"></div>
        ${flagHtml}
        <span class="session-chevron">▾</span>
      </div>
      <div class="session-collapsed" id="collapsed-${vi}" style="display:flex;gap:5px;flex-wrap:wrap;padding:0 2px 10px;align-items:center">
        ${miniChips}${moreCount}
        <span style="flex:1"></span>
        <button class="sess-btn" onclick="event.stopPropagation();openAdd(${ri})" style="font-size:11px;padding:3px 8px">✏️ Edit</button>
        <button class="sess-btn danger" onclick="event.stopPropagation();delSess(${ri})" style="font-size:11px;padding:3px 8px">🗑</button>
      </div>
      <div class="session-body" id="body-${vi}">
        <div style="padding-bottom:2px">
          <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px;padding:0 2px">
            <button class="sess-btn" onclick="event.stopPropagation();openAdd(${ri})">✏️ Edit</button>
            <button class="sess-btn danger" onclick="event.stopPropagation();delSess(${ri})">🗑 Delete</button>
          </div>
          ${panels||'<div style="padding:12px 14px;color:var(--muted);font-size:13px">No values recorded</div>'}
        </div>
      </div>
    </div>`;
  });
  c.innerHTML=html;
}

function toggleSession(id) {
  const sess=document.getElementById(id);
  const idx=id.split('-')[1];
  const collapsed=document.getElementById('collapsed-'+idx);
  const isOpen=sess.classList.contains('open');
  // close all others
  document.querySelectorAll('.session.open').forEach(s=>{
    s.classList.remove('open');
    const i=s.id.split('-')[1];
    const col=document.getElementById('collapsed-'+i);
    if(col) col.style.display='flex';
  });
  if (!isOpen) {
    sess.classList.add('open');
    if(collapsed) collapsed.style.display='none';
  }
}

// ── TRENDS ───────────────────────────────────────────────────────
function renderTrends(c) {
  const avail=FIELDS.filter(k=>records.filter(r=>r[k]!=null).length>=2);
  const pills=avail.map(k=>`<div class="cpill ${k===chartKey?'active':''}" onclick="setCK('${k}')">${REF[k].name}</div>`).join('');
  c.innerHTML=`<div class="slabel">Metric History</div>
    <div class="chart-pills">${pills||'<span style="color:var(--muted);font-size:13px">Need ≥2 sessions per metric</span>'}</div>
    <div class="chart-wrap"><canvas id="tc" height="250"></canvas></div>`;
  if (avail.length) drawChart();
}

function drawChart() {
  if (chartInst){chartInst.destroy();chartInst=null;}
  const k=chartKey; const r=REF[k];
  const pts=[...records].filter(rec=>rec[k]!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const colors=pts.map(p=>({ok:'#3ddc84',hi:'#ff5c5c',lo:'#ffb347',na:'#6888aa'})[st(k,p[k])]);
  chartInst=new Chart(document.getElementById('tc'),{
    type:'line',
    data:{
      labels:pts.map(p=>fmtShort(p.date)),
      datasets:[{
        label:r.name, data:pts.map(p=>p[k]),
        borderColor:'#4fa3f7', backgroundColor:'rgba(79,163,247,0.07)',
        borderWidth:2.5, pointBackgroundColor:colors, pointBorderColor:colors,
        pointRadius:7, pointHoverRadius:10, fill:true, tension:0.38
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#122040', borderColor:'#1e3256', borderWidth:1,
          titleColor:'#6888aa', bodyColor:'#ddeeff',
          callbacks:{label:ctx=>`${ctx.parsed.y} ${r.unit}`}
        }
      },
      scales:{
        x:{ticks:{color:'#6888aa',font:{size:10},maxRotation:45},grid:{color:'rgba(30,50,86,0.4)'}},
        y:{ticks:{color:'#6888aa',font:{size:11}},grid:{color:'rgba(30,50,86,0.4)'}}
      }
    }
  });
}
function setCK(k){chartKey=k;renderTrends(document.getElementById('content'));}

// ── SUMMARY ──────────────────────────────────────────────────────
function renderSummary(c) {
  let html=`<div class="slabel">Latest Value Per Metric</div>`;
  Object.entries(GROUPS).forEach(([gname,g])=>{
    const present=g.keys.filter(k=>records.some(r=>r[k]!=null));
    if (!present.length) return;
    html+=`<div class="panel-card" style="margin-bottom:12px">
      <div class="panel-header"><span class="panel-icon">${g.icon}</span><span class="panel-title">${gname}</span></div>`;
    present.forEach(k=>{
      const pts=[...records].filter(r=>r[k]!=null).sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latest=pts[0]; const prev=pts[1]; const val=latest[k];
      const [bc,bl]=bdg(k,val); const sc=`s-${st(k,val)}`;
      let trend='';
      if (prev){
        const d=(val-prev[k]).toFixed(1); const up=parseFloat(d)>0;
        trend=`<span style="font-size:10px;color:${up?'var(--danger)':'var(--accent2)'};margin-left:4px">${up?'↑':'↓'}${Math.abs(d)}</span>`;
      }
      html+=`<div class="metric-row">
        <div class="mr-name"><div class="mn">${REF[k].name}</div><div class="mu">${fmtShort(latest.date)}</div></div>
        <div class="mr-val ${sc}">${val}${trend}<span class="vu"> ${REF[k].unit}</span></div>
        <div class="mr-badge ${bc}">${bl}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  c.innerHTML=html;
}

// ── REFERENCE ────────────────────────────────────────────────────
function renderRef(c) {
  let html=`<div class="slabel">Normal Reference Ranges — Adult Male</div>`;
  Object.entries(GROUPS).forEach(([gname,g])=>{
    html+=`<div class="ref-group"><div class="rg-head">${g.icon} ${gname}</div>`;
    g.keys.forEach(k=>{
      const r=REF[k];
      const rng=r.hdlMode?'Male &gt;40 · Low-risk &gt;55':r.lo===0?`&lt;${r.hi} ${r.unit}`:`${r.lo}–${r.hi} ${r.unit}`;
      html+=`<div class="rg-row"><span>${r.name}</span><span class="rg-range">${rng}</span></div>`;
    });
    html+=`</div>`;
  });
  c.innerHTML=html;
}

// ── ADD / EDIT ────────────────────────────────────────────────────
function openAdd(idx) {
  editIndex=idx!==undefined?idx:null;
  document.getElementById('addTitle').textContent=editIndex!==null?'Edit Session':'New Session';
  document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
  FIELDS.forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value='';});
  if (editIndex!==null) {
    const r=records[editIndex];
    document.getElementById('f-date').value=r.date;
    FIELDS.forEach(k=>{const el=document.getElementById('f-'+k);if(el&&r[k]!=null)el.value=r[k];});
  }
  document.getElementById('addOverlay').classList.add('open');
}

function saveRecord() {
  const date=document.getElementById('f-date').value;
  if (!date){toast('Please select a date ⚠️');return;}
  const rec={date};
  FIELDS.forEach(k=>{const el=document.getElementById('f-'+k);if(el){const v=pn(el.value);if(v!=null)rec[k]=v;}});
  if (editIndex!==null){records[editIndex]=rec;toast('Session updated ✓');}
  else{records.push(rec);toast('Session saved ✓');}
  persist();cm('addOverlay');render();
}

function delSess(idx) {
  if (!confirm('Delete this session?')) return;
  records.splice(idx,1);persist();render();toast('Deleted');
}

// ── UPLOAD + MULTI-FILE AI PARSE ──────────────────────────────────
function openUpload() {
  fileQueue=[];
  document.getElementById('fileInput').value='';
  document.getElementById('fileQueue').innerHTML='';
  document.getElementById('parseBar').classList.remove('visible');
  document.getElementById('aggPreview').innerHTML='';
  document.getElementById('scanBtn').style.display='none';
  document.getElementById('uploadOverlay').classList.add('open');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadBox').classList.remove('drag');
  queueFiles(e.dataTransfer.files);
}

function queueFiles(files) {
  Array.from(files).forEach(f=>{
    if (!fileQueue.find(q=>q.file.name===f.name&&q.file.size===f.size))
      fileQueue.push({file:f,status:'pending',result:null});
  });
  renderQueue();
  document.getElementById('scanBtn').style.display=fileQueue.length?'block':'none';
  document.getElementById('aggPreview').innerHTML='';
}

function renderQueue() {
  const el=document.getElementById('fileQueue');
  if (!fileQueue.length){el.innerHTML='';return;}
  el.innerHTML=fileQueue.map((q,i)=>{
    const icon=q.file.type==='application/pdf'?'📄':'🖼️';
    const stat={
      pending:`<span style="color:var(--muted)">Queued</span>`,
      processing:`<span style="color:var(--accent)">Reading…</span>`,
      done:`<span style="color:var(--good)">✓ Done</span>`,
      error:`<span style="color:var(--danger)">✕ Failed</span>`
    }[q.status];
    const rm=q.status==='pending'?`<button class="fq-remove" onclick="rmQ(${i})">✕</button>`:'';
    return `<div class="fq-item"><div class="fq-icon">${icon}</div><div class="fq-name">${q.file.name}</div><div class="fq-status">${stat}</div>${rm}</div>`;
  }).join('');
}

function rmQ(i){fileQueue.splice(i,1);renderQueue();if(!fileQueue.length)document.getElementById('scanBtn').style.display='none';}

async function startParsing() {
  if (!fileQueue.length) return;
  document.getElementById('scanBtn').style.display='none';
  document.getElementById('aggPreview').innerHTML='';
  const pb=document.getElementById('parseBar'); pb.classList.add('visible');
  const pt=document.getElementById('parseText');
  const ps=document.getElementById('parseSub');
  const spinner=document.getElementById('parseSpinner');

  const SYS=`You are a medical lab report data extractor. Extract ALL numerical lab values from the provided image or document.
Return ONLY a valid JSON object (no markdown, no backticks, no explanation) with these exact keys where values are found:
date (YYYY-MM-DD format from report's sample collection date), sugar, hba1c, avgGlucose, chol, trig, hdl, ldl, vldl, tcholRatio, ldlhdlRatio, urea, creatinine, uric, thyroid, t3, t4, vitd, vitb12, hb.
Only include keys where values clearly appear in the report. Values must be plain numbers only.`;

  const allResults=[];

  for (let i=0;i<fileQueue.length;i++) {
    const q=fileQueue[i];
    fileQueue[i].status='processing'; renderQueue();
    pt.textContent=`Reading file ${i+1} of ${fileQueue.length}…`;
    ps.textContent=q.file.name;
    try {
      const b64=await toB64(q.file);
      const isImg=q.file.type.startsWith('image/');
      const isPdf=q.file.type==='application/pdf';
      if (!isImg&&!isPdf) throw new Error('Unsupported file type');
      const content=isImg
        ?[{type:'image',source:{type:'base64',media_type:q.file.type,data:b64}},{type:'text',text:'Extract all lab values as JSON.'}]
        :[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Extract all lab values as JSON.'}];
      let res;
      try {
        const apiKey = localStorage.getItem('hlp_apikey')||'';
        if (!apiKey) { const e=new Error('no_api_key'); e.code='no_api_key'; throw e; }
        res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key': apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
          },
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:[{role:'user',content}]})
        });
      } catch(netErr) {
        fileQueue[i].status='error';
        fileQueue[i].errorMsg = netErr.code==='no_api_key' ? 'no_api_key' : 'network';
        renderQueue(); continue;
      }
      if (!res.ok) {
        const errBody = await res.json().catch(()=>({}));
        fileQueue[i].status='error';
        fileQueue[i].errorMsg = errBody?.error?.message || `HTTP ${res.status}`;
        renderQueue(); continue;
      }
      const data=await res.json();
      const raw=data.content?.find(b=>b.type==='text')?.text||'{}';
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      fileQueue[i].status='done'; fileQueue[i].result=parsed; allResults.push(parsed);
    } catch(e) {
      fileQueue[i].status='error'; fileQueue[i].errorMsg=e.message; console.error(e);
    }
    renderQueue();
  }

  // AGGREGATE: merge all results — first non-null value per key wins
  spinner.style.display='none';

  // Check failure reasons
  const noKeyFails = fileQueue.filter(q=>q.errorMsg==='no_api_key');
  const networkFails = fileQueue.filter(q=>q.errorMsg==='network');
  const isLocalFile = location.protocol==='file:' || location.protocol==='content:' || location.hostname==='';

  if (!allResults.length) {
    if (noKeyFails.length) {
      showApiKeySetup();
    } else if (networkFails.length || isLocalFile) {
      showCorsError();
    } else {
      const errMsgs = fileQueue.filter(q=>q.errorMsg).map(q=>q.errorMsg).join('; ');
      pt.innerHTML=`<span style="color:var(--danger)">✕</span> Could not extract data. ${errMsgs}`;
      document.getElementById('aggPreview').innerHTML=`
        <div style="margin-top:10px">
          <button class="sbtn sec" style="margin-top:0" onclick="manualFallback()">✏️ Enter Values Manually Instead</button>
        </div>`;
    }
    return;
  }

  const merged={};
  allResults.forEach(r=>{Object.entries(r).forEach(([k,v])=>{if(v!=null&&merged[k]==null)merged[k]=v;});});
  if (!merged.date) merged.date=new Date().toISOString().split('T')[0];

  const count=FIELDS.filter(k=>merged[k]!=null).length;
  pt.innerHTML=`<span style="color:var(--accent2)">✓</span> Merged ${allResults.length} report${allResults.length>1?'s':''} — ${count} values found`;
  ps.textContent='';

  showAggPreview(merged, allResults.length);
}

function showApiKeySetup() {
  const pt=document.getElementById('parseText');
  const ps=document.getElementById('parseSub');
  pt.innerHTML=`<span style="color:var(--warn)">⚠️</span> API key needed`;
  ps.textContent='';
  document.getElementById('aggPreview').innerHTML=`
    <div style="background:rgba(79,163,247,0.07);border:1px solid rgba(79,163,247,0.2);border-radius:14px;padding:16px;margin-top:4px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">🔑 One-time Setup: Anthropic API Key</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px">
        The AI Scan feature needs your personal Anthropic API key. It's stored <b style="color:var(--text)">only on this device</b> (localStorage) and never sent anywhere except directly to Anthropic.<br><br>
        <b style="color:var(--text)">Get your free key:</b><br>
        1. Go to <b style="color:var(--accent)">console.anthropic.com</b><br>
        2. Sign up / Log in → <b>API Keys</b> → <b>Create Key</b><br>
        3. Copy the key (starts with <code style="font-size:11px;background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px">sk-ant-...</code>)<br>
        4. Paste it below ↓
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input id="apiKeyInput" type="password" placeholder="sk-ant-api03-..." 
          style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--card);font-family:Sora,sans-serif;font-size:13px;color:var(--text);outline:none;"
          oninput="this.style.borderColor=this.value.startsWith('sk-ant')?'var(--good)':'var(--border2)'">

      </div>
    </div>`;
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant')) { 
    toast('Invalid key — should start with sk-ant…'); 
    return; 
  }
  localStorage.setItem('hlp_apikey', key);
  toast('API key saved ✓ — retrying scan…');
  setTimeout(()=>startParsing(), 800);
}

function showCorsError() {
  const pt=document.getElementById('parseText');
  const ps=document.getElementById('parseSub');
  pt.innerHTML=`<span style="color:var(--danger)">✕</span> AI scan blocked — see fix below`;
  ps.textContent='';
  document.getElementById('aggPreview').innerHTML=`
    <div style="background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.25);border-radius:14px;padding:16px;margin-top:4px">
      <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:10px">⚠️ Why this happens</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px">
        The file is opened directly from your Downloads folder (<code style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px;font-size:11px">content://</code>). Browsers block API calls from local files for security.<br><br>
        <b style="color:var(--text)">Fix — do one of these:</b>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        <div style="background:rgba(0,229,180,0.08);border:1px solid rgba(0,229,180,0.2);border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.6">
          <b style="color:var(--accent2)">✅ Best:</b> Open the app in <b style="color:var(--text)">Claude.ai</b> — the AI Scan will work perfectly there.
        </div>
        <div style="background:rgba(79,163,247,0.08);border:1px solid rgba(79,163,247,0.2);border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.6">
          <b style="color:var(--accent)">🌐 Alt:</b> Host the file on any web server (e.g. upload to GitHub Pages, Netlify, or run <code style="font-size:11px">python -m http.server</code> locally).
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Or skip AI and enter values manually:</div>
      <button class="sbtn sec" style="margin-top:0" onclick="manualFallback()">✏️ Enter Values Manually</button>
    </div>`;
}

function manualFallback() {
  cm('uploadOverlay');
  openAdd();
}

function manageApiKey() {
  const existing = localStorage.getItem('hlp_apikey')||'';
  const masked = existing ? 'sk-ant-…'+existing.slice(-6) : 'Not set';
  const action = existing
    ? `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Current key: <code style="color:var(--accent2)">${masked}</code></div>
       <button class="sbtn" style="margin-top:0" onclick="promptNewKey()">🔄 Replace Key</button>
       <button class="sbtn sec" style="margin-top:8px" onclick="if(confirm('Clear API key?')){localStorage.removeItem('hlp_apikey');toast('Key cleared');cm('addOverlay')}">🗑 Clear Key</button>`
    : `<button class="sbtn" style="margin-top:0" onclick="promptNewKey()">🔑 Set API Key</button>`;

  document.getElementById('addTitle').textContent = '🔑 API Key';
  // reuse add modal content area
  document.querySelector('#addOverlay .modal').innerHTML = `
    <div class="drag-pill"></div>
    <div class="modal-title"><span>API Key Settings</span><button class="xbtn" onclick="cm('addOverlay')">✕</button></div>
    <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px">
      Your Anthropic API key is stored <b style="color:var(--text)">only on this device</b>.<br>
      Get one free at <b style="color:var(--accent)">console.anthropic.com</b> → API Keys.
    </div>
    ${action}`;
  document.getElementById('addOverlay').classList.add('open');
}

function promptNewKey() {
  document.querySelector('#addOverlay .modal').innerHTML = `
    <div class="drag-pill"></div>
    <div class="modal-title"><span>Enter API Key</span><button class="xbtn" onclick="cm('addOverlay');location.reload()">✕</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Paste your key below. It starts with <code style="font-size:11px">sk-ant-</code></div>
    <input id="apiKeyInput2" type="password" placeholder="sk-ant-api03-..."
      style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--card);font-family:Sora,sans-serif;font-size:13px;color:var(--text);outline:none;margin-bottom:12px"
      oninput="this.style.borderColor=this.value.startsWith('sk-ant')?'var(--good)':'var(--border2)'">
    <button class="sbtn" style="margin-top:0" onclick="
      const k=document.getElementById('apiKeyInput2').value.trim();
      if(!k.startsWith('sk-ant')){toast('Invalid key');return;}
      localStorage.setItem('hlp_apikey',k);
      toast('API key saved ✓');
      cm('addOverlay');
      location.reload();
    ">💾 Save Key</button>`;
}

function showAggPreview(merged, fileCount) {
  const metricKeys=FIELDS.filter(k=>merged[k]!=null);
  if (!metricKeys.length) {
    document.getElementById('aggPreview').innerHTML=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">No lab values found. Try a clearer image.</div>`;
    return;
  }

  let panelHtml='';
  Object.entries(GROUPS).forEach(([gname,g])=>{
    const present=g.keys.filter(k=>merged[k]!=null);
    if (!present.length) return;
    panelHtml+=`<div class="panel-card" style="margin-bottom:8px">
      <div class="panel-header"><span class="panel-icon">${g.icon}</span><span class="panel-title">${gname}</span></div>`;
    present.forEach(k=>{
      const val=merged[k]; const [bc,bl]=bdg(k,val); const sc=`s-${st(k,val)}`;
      panelHtml+=`<div class="metric-row">
        <div class="mr-name"><div class="mn">${REF[k].name}</div><div class="mu">${REF[k].unit}</div></div>
        <div class="mr-val ${sc}">${val}<span class="vu"> ${REF[k].unit}</span></div>
        <div class="mr-badge ${bc}">${bl}</div>
      </div>`;
    });
    panelHtml+=`</div>`;
  });

  const safeStr=JSON.stringify(merged).replace(/"/g,'&quot;');
  document.getElementById('aggPreview').innerHTML=`
    <div class="agg-box">
      <div class="agg-top">
        <div class="agg-title">✅ ${fileCount} report${fileCount>1?'s':''} merged · ${metricKeys.length} values extracted</div>
        <div class="agg-sub">Confirm the date and save</div>
      </div>
      <div class="date-row">
        <label>Session Date (from report)</label>
        <input type="date" id="aggDate" value="${merged.date}">
      </div>
    </div>
    ${panelHtml}
    <button class="sbtn" onclick="saveAgg('${safeStr}')">💾 Save as New Session</button>
    <button class="sbtn sec" onclick="editAgg('${safeStr}')">✏️ Edit Before Saving</button>`;
}

function saveAgg(mergedStr) {
  const merged=JSON.parse(mergedStr.replace(/&quot;/g,'"'));
  const date=document.getElementById('aggDate')?.value||merged.date;
  const rec={date};
  FIELDS.forEach(k=>{if(merged[k]!=null)rec[k]=merged[k];});

  const exi=records.findIndex(r=>r.date===date);
  if (exi>=0) {
    if (confirm(`A session for ${fmtDate(date)} exists. Merge into it (only missing values filled in)?`)) {
      FIELDS.forEach(k=>{if(rec[k]!=null&&records[exi][k]==null)records[exi][k]=rec[k];});
      toast('Session merged ✓');
    } else return;
  } else {
    records.push(rec); toast('Session saved ✓');
  }
  persist(); cm('uploadOverlay'); render();
}

function editAgg(mergedStr) {
  const merged=JSON.parse(mergedStr.replace(/&quot;/g,'"'));
  cm('uploadOverlay');
  editIndex=null;
  document.getElementById('addTitle').textContent='Review & Save Session';
  const date=document.getElementById('aggDate')?.value||merged.date;
  document.getElementById('f-date').value=date;
  FIELDS.forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value=merged[k]!=null?merged[k]:'';});
  document.getElementById('addOverlay').classList.add('open');
}

// ── HELPERS ──────────────────────────────────────────────────────
function toB64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function setTab(tab,el) {
  currentTab=tab;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); render();
}
function cm(id){document.getElementById(id).classList.remove('open');}
function ooc(e,id){if(e.target===document.getElementById(id))cm(id);}

load(); render();
</script>
